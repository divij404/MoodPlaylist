# fly.toml — Fly.io deploy config for MoodSync backend
app = "moodsync-api"   # change this to your chosen app name
primary_region = "ewr" # Newark — pick closest: ord, lax, ams, syd, etc.

[build]
  # Fly auto-detects Python via requirements.txt — no Dockerfile needed

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true   # machines sleep when idle (free tier friendly)
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
